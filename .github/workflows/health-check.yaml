name: Health Check

on:
  push:
    # branches: [ health-check ]
    branches: [disabled]
  # schedule:
  # - cron: "0 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: health-check
      - uses: actions/setup-go@v4
        with:
          go-version: "stable"

      - name: Run Health Check
        run: |
          go run .

      - uses: EndBug/add-and-commit@v9
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: deploy gh-pages
        run: |
          cd web
          echo "status.dongfg.com" > CNAME
          git init
          git config --local user.name dongfg
          git config --local user.email mail@dongfg.com
          git remote add origin https://${{secrets.ACCESS_TOKEN}}@github.com/$GITHUB_REPOSITORY.git
          git checkout -b gh-pages
          git add --all
          git commit -m "deploy gh-pages"
          git push origin gh-pages -f

      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
